applications:
  app:
    type: nodejs:20
    web:
      commands:
        start: node server.js
      locations:
        /:
          passthru: true

routes:
  "https://{default}/":
    type: proxy
    to: "http://{{ env.VPS_HOST }}:{{ env.VPS_PORT }}"
  "http://{default}/":
    type: redirect
    to: "https://{default}/"
